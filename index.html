<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domain For Sale</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f8fa;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #333;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }
    .price {
      font-size: 27px;
      color: #2e7d32;
      margin: 15px 0;
      font-weight: bold;
    }
    p {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }
    a.button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
    a.button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>This Domain Is For Sale</h1>
    <p class="price">$250 USD</p>
    <p>
      This domain name is available for purchase.<br>
      If you're interested, please contact the owner.
    </p>
    <a class="button" href="mailto:info@starman.io">
      Contact Owner
    </a>
    <p style="margin-top:15px; font-size:12px;">
      Email: info@starman.io
    </p>
  </div>
</body>
</html>
